# Runs a linear classifier on top of image + text using prompt "a photo of a"

coslr: true
criterions:
  PerformanceLoss:
    def_file: ./loss/SoftmaxLoss.py
    loss_params: {}
    optim_params: null
    weight: 1.0
endlr: 0.0
last: false
model:
  fusion:
    optim_params: {lr: 0.2, momentum: 0.9, weight_decay: 0.0005}
    params: {in_dim: 1024, out_dim: 1000}
shuffle: true

train_variant: 0
training_opt:

  variation: "3" # This determines the rule for combining the text and images
  image_emb_weight: "0.5" # Relevant for variation 3

  batch_size: 100
  dataset: ImageNet_LT
  dataloader: "paired"
  display_step: 10
  feature_dim: 1024
  num_classes: 1000
  num_epochs: 50
  num_workers: 12
  open_threshold: 0.1
  sampler: null
  scheduler_params: {gamma: 0.1, step_size: 3}
